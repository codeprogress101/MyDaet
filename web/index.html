<!DOCTYPE html>
<html>
<head>
  <style>
  body {
    margin: 0;
    background: #0b5ed7;
    font-family: Arial, sans-serif;
  }

  #welcome {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    text-align: center;
  }

  #welcome img {
    width: 300px;
    margin-bottom: 16px;
  }

  #welcome h1 {
    margin: 0;
    font-size: 2.2rem;
  }

  #welcome p {
    margin-top: 8px;
    opacity: 0.9;
  }
</style>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="mydaet">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>mydaet</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- SIMPLE WELCOME SCREEN -->
  <div id="welcome">
    <img src="/assets/images/mydaet_logo_dark.png" alt="MyDaet Logo" />
    <h1>Welcome to MyDaet</h1>
    <p>Connecting citizens. Building better communities.</p>
  </div>

  <!-- Flutter app loads here -->
  <script src="flutter.js" defer></script>
  <script>
    window.addEventListener('load', function () {
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: null,
        },
        onEntrypointLoaded: function (engineInitializer) {
          engineInitializer.initializeEngine().then(function (appRunner) {
            appRunner.runApp();
          });
        },
      });
    });
  </script>
</body>

</html>
